name: build-release

on:
  workflow_dispatch:
    inputs:
      latest_version:
        description: 'Latest Kubernetes version (e.g. v1.36). The 3 previous versions will also be built.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download latest docgen binary
        run: |
          TAG=$(gh release view --repo kubernetools/docgen --json tagName -q .tagName)
          gh release download "$TAG" \
            --repo kubernetools/docgen \
            --pattern "*linux-x86_64" \
            --output docgen
          chmod +x docgen
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Delete site directory
        run: rm -rf ./site

      - name: Generate site for latest version
        run: |
          ./docgen generate \
            --k8s-version "${{ inputs.latest_version }}" \
            --out ./site \
            --base-url https://www.kubernetools.com \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --is-latest

      - name: Generate site for previous versions
        run: |
          LATEST="${{ inputs.latest_version }}"
          MINOR=$(echo "$LATEST" | sed 's/v1\.//')
          for i in 1 2 3; do
            PREV_VERSION="v1.$((MINOR - i))"
            ./docgen generate \
              --k8s-version "$PREV_VERSION" \
              --out ./site \
              --base-url https://www.kubernetools.com \
              --token "${{ secrets.GITHUB_TOKEN }}"
          done

      - name: Create pull request
        run: |
          BRANCH="site/rebuild-${{ inputs.latest_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A ./site
          if git diff --cached --quiet; then
            echo "No changes generated; site is already up to date."
            exit 0
          fi
          git commit -m "build: rebuild site for Kubernetes ${{ inputs.latest_version }} and 3 previous versions"
          git push --force origin "$BRANCH"
          gh pr create \
            --title "Site: Rebuild for Kubernetes ${{ inputs.latest_version }}" \
            --body "Automated site rebuild for Kubernetes \`${{ inputs.latest_version }}\` (latest, with \`--is-latest\`) and 3 previous versions." \
            --head "$BRANCH" \
            --base main \
          || echo "PR already exists for branch $BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}
